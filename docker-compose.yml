version: '3.8'

services:
  mongodb:
    image: mongo:latest
    container_name: volunteer-system-db
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: admin123
      MONGO_INITDB_DATABASE: volunteer-system
    volumes:
      - mongodb_data:/data/db
    networks:
      - volunteer-network

  mongo-express:
    image: mongo-express:latest
    container_name: volunteer-system-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_ADMINUSERNAME: admin
      ME_CONFIG_MONGODB_ADMINPASSWORD: admin123
      ME_CONFIG_MONGODB_URL: mongodb://admin:admin123@mongodb:27017/
    depends_on:
      - mongodb
    networks:
      - volunteer-network

volumes:
  mongodb_data:

networks:
  volunteer-network:
    driver: bridge
